<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Puzzle</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #222;
        color: white;
    }

    h1 {
        margin-top: 20px;
    }

    #puzzle {
        width: 300px;
        height: 300px;
        margin: 20px auto;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 5px;
    }

    .tile {
        background: #00adb5;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
        border-radius: 10px;
        cursor: pointer;
    }

    .empty {
        background: transparent;
        cursor: default;
    }

    button {
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        background: #ff5722;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<h1>🧩 Puzzle Geser</h1>
<div id="puzzle"></div>
<button onclick="shuffle()">Acak</button>

<script>
let tiles = [1,2,3,4,5,6,7,8,""];
const puzzle = document.getElementById("puzzle");

function render() {
    puzzle.innerHTML = "";
    tiles.forEach((tile, index) => {
        const div = document.createElement("div");
        div.className = "tile";
        if (tile === "") {
            div.classList.add("empty");
        } else {
            div.textContent = tile;
            div.onclick = () => move(index);
        }
        puzzle.appendChild(div);
    });
}

function move(index) {
    const emptyIndex = tiles.indexOf("");

    const validMoves = [
        index - 1,
        index + 1,
        index - 3,
        index + 3
    ];

    if (validMoves.includes(emptyIndex)) {
        [tiles[index], tiles[emptyIndex]] = [tiles[emptyIndex], tiles[index]];
        render();
        checkWin();
    }
}

function shuffle() {
    tiles.sort(() => Math.random() - 0.5);
    render();
}

function checkWin() {
    const win = [1,2,3,4,5,6,7,8,""];
    if (JSON.stringify(tiles) === JSON.stringify(win)) {
        setTimeout(() => alert("🎉 Kamu Menang!"), 200);
    }
}

render();
</script>

</body>
</html>
